name: Feature request
description: An idea to make captures smaller, smarter, or more useful for LLMs
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that NetDigest doesn't handle well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen instead? Example exports welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Workaround you use today (optional)
